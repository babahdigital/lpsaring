# my-project/.github/workflows/deploy.yml

name: Docker Build & Push to Docker Hub

on:
  push:
    branches:
      - main # Trigger workflow ini setiap kali ada push ke branch 'main'
  workflow_dispatch: # Memungkinkan menjalankan workflow secara manual

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Jalankan job ini di runner Ubuntu terbaru (x86_64)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch build
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend Image (ARM64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -t ${{ secrets.DOCKER_USERNAME }}/myapp-frontend:latest \
            ./frontend
        # Perintah ini akan membangun image frontend untuk ARM64 di runner GitHub Actions (x86_64)
        # QEMU akan mengemulasikan lingkungan ARM64 selama build ini.
        # Image akan dipush ke Docker Hub.

      - name: Build and Push Backend Image (ARM64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -t ${{ secrets.DOCKER_USERNAME }}/myapp-backend:latest \
            ./backend
        # Perintah ini akan membangun image backend untuk ARM64 di runner GitHub Actions (x86_64)
        # Image akan dipush ke Docker Hub.

      - name: SSH into Raspberry Pi and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.RASPBERRY_PI_IP }} # Ganti dengan secret IP Pi Anda
          username: ${{ secrets.RASPBERRY_PI_USERNAME }} # Ganti dengan secret Username Pi Anda
          key: ${{ secrets.RASPBERRY_PI_SSH_KEY }} # Ganti dengan secret SSH key Pi Anda
          script: |
            cd /path/to/your/app/on/pi # <--- UBAH INI ke direktori aplikasi di Pi
            docker compose pull
            docker compose down # Hentikan kontainer lama
            docker compose up -d # Jalankan kontainer baru
            docker image prune -f # Bersihkan image lama yang tidak terpakai