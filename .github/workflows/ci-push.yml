name: CI Push Gate

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.lock.txt

      - name: Lint backend
        run: python -m ruff check backend

      - name: Test backend
        run: python -m pytest backend/tests --ignore=backend/tests/test_whatsapp_send.py

  frontend:
    runs-on: ubuntu-latest
    env:
      NUXT_PUBLIC_APP_BASE_URL: https://lpsaring.babahdigital.net
      NUXT_PUBLIC_API_BASE_URL: /api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Enable corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install

      - name: Lint frontend
        working-directory: frontend
        run: pnpm run lint

      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm run typecheck

      - name: Run focused frontend unit tests
        working-directory: frontend
        run: |
          pnpm run test -- \
            tests/auth-access.test.ts \
            tests/auth-guards.test.ts \
            tests/access-status-parity.contract.test.ts \
            tests/payment-composables.test.ts \
            tests/payment-status-polling.test.ts

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build