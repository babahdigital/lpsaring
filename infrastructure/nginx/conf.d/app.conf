# Konfigurasi server utama yang mendengarkan di port 80
server {
    listen 80;
    server_name localhost; # Ganti dengan domain Anda jika sudah ada

    # ----- AWAL KONFIGURASI REAL IP -----
    # Percayai IP dari rentang umum jaringan internal Docker.
    # Ini penting agar Nginx dapat mengambil IP asli dari header X-Forwarded-For
    # yang mungkin ditambahkan oleh gateway Docker atau proxy sebelumnya.
    set_real_ip_from  172.16.0.0/12;  # Mencakup 172.16.0.0 - 172.31.255.255 (umum untuk Docker)
    set_real_ip_from  192.168.0.0/16; # Rentang IP umum untuk jaringan lokal (jika relevan)
    set_real_ip_from  10.0.0.0/8;     # Rentang IP umum lainnya untuk jaringan lokal

    # Header yang akan digunakan untuk mengambil IP asli klien.
    # Nginx akan mencari IP klien di header ini jika permintaan datang dari proxy yang dipercaya.
    real_ip_header    X-Forwarded-For;

    # Jika X-Forwarded-For berisi beberapa alamat IP (misalnya, IP_ASLI, IP_PROXY1),
    # 'on' akan mengambil IP paling kiri (IP_ASLI) setelah mengabaikan IP proxy yang dipercaya.
    real_ip_recursive on;
    # ----- AKHIR KONFIGURASI REAL IP -----

    client_max_body_size 10M;
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Lokasi untuk API Backend
    location /api/ {
        proxy_buffering off;

        # Header untuk meneruskan informasi asli client dan request ke backend
        proxy_set_header Host $host;
        # $remote_addr di sini sekarang akan menjadi IP klien yang "sebenarnya"
        # setelah diproses oleh modul ngx_http_realip_module.
        proxy_set_header X-Real-IP $remote_addr;
        # $proxy_add_x_forwarded_for akan mengambil X-Forwarded-For yang masuk (jika ada)
        # dan menambahkan $remote_addr (yang sudah benar) ke dalamnya.
        # Jika tidak ada X-Forwarded-For yang masuk, akan diisi dengan $remote_addr.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Opsional, tapi bisa berguna untuk debugging atau aplikasi tertentu:
        # proxy_set_header X-Forwarded-Server $host;
        # proxy_set_header X-Forwarded-Path $request_uri;

        # Optimasi koneksi ke backend
        proxy_http_version 1.1;
        # Penting untuk menjaga koneksi keep-alive yang dikelola oleh Nginx, bukan oleh backend secara langsung
        proxy_set_header Connection "";

        proxy_pass http://backend:5010; # Pastikan service name dan port backend benar
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Lokasi default untuk Frontend Nuxt
    location / {
        # Header untuk meneruskan informasi asli client dan request ke frontend
        # (Biasanya frontend tidak terlalu membutuhkan ini, tapi konsisten)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr; # Sudah IP klien asli
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # Sudah IP klien asli
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Optimasi koneksi & dukungan WebSocket untuk Nuxt (HMR, dll.)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade; # Diperlukan untuk WebSocket
        proxy_set_header Connection "upgrade";  # Diperlukan untuk WebSocket

        proxy_pass http://frontend:3010; # Pastikan service name dan port frontend benar
        proxy_redirect off; # Umumnya disarankan 'off' untuk SPA atau Nuxt
    }
}