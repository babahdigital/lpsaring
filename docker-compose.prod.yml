# ===============================================================
#  Docker-Compose – Lingkungan Produksi
# ===============================================================
name: hotspot-portal-prod

services:
  # ------------------------
  #  Init: Permission untuk folder backups
  # ------------------------
  backups_init:
    image: babahdigital/sobigidul_backend:latest
    container_name: hotspot_prod_backups_init
    user: "0:0"
    volumes:
      - ./backend/backups:/app/backups
    command: >
      sh -lc "mkdir -p /app/backups && chown -R 999:999 /app/backups && chmod -R ug+rwX /app/backups"
    networks:
      - hotspot_prod_network
    restart: "no"

  # ------------------------
  #  Database PostgreSQL
  # ------------------------
  db:
    image: postgres:15-alpine
    container_name: hotspot_prod_postgres_db
    env_file:
      - .env.prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - hotspot_prod_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -q"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  # ------------------------
  #  Redis
  # ------------------------
  redis:
    image: redis:7-alpine
    container_name: hotspot_prod_redis_cache
    # Batasi memori Redis agar tidak OOM seluruh server.
    # allkeys-lru: evict key lama saat penuh (safe untuk cache/session).
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    volumes:
      - redis_prod_data:/data
    networks:
      - hotspot_prod_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  # ------------------------
  #  Database Migration (Alembic)
  # ------------------------
  migrate:
    image: babahdigital/sobigidul_backend:latest
    container_name: hotspot_prod_flask_migrate
    env_file:
      - .env.prod
    volumes:
      - ./.env.prod:/app/.env:ro
    command: flask db upgrade
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hotspot_prod_network
    restart: "no"

  # ------------------------
  #  Flask Backend (Gunicorn)
  # ------------------------
  backend:
    image: babahdigital/sobigidul_backend:latest
    container_name: hotspot_prod_flask_backend
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    env_file:
      - .env.prod
    environment:
      # Timeout (detik) untuk fase TCP connect + auth MikroTik (threading wrapper).
      # routeros-api 0.21 tidak punya socket_timeout; nilai ini di-enforce via thread deadline.
      MIKROTIK_CONNECT_TIMEOUT_SECONDS: "10"
      # Timeout (detik) untuk I/O socket setelah koneksi — diterapkan bila library support.
      MIKROTIK_SOCKET_TIMEOUT_SECONDS: "10"
    volumes:
      - ./.env.prod:/app/.env:ro
      - ./backend/backups:/app/backups
    command:
      - "gunicorn"
      - "--bind"
      - "0.0.0.0:5010"
      - "run:app"
      - "--workers=9"
      # Worker class sync (default). Untuk upgrade ke gthread (I/O-bound benefit),
      # tambahkan: --worker-class=gthread --threads=2
      # Pastikan mikrotik_client._connection_pool diproteksi threading.Lock() sebelum ganti.
      - "--timeout=120"
      - "--graceful-timeout=120"
      - "--keep-alive=2"
      - "--log-level=info"
      - "--access-logfile=-"
      - "--error-logfile=-"
    # Tidak mem-publish port ke host.
    # Produksi WAJIB diakses melalui Cloudflare Tunnel -> nginx.
    depends_on:
      backups_init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      hotspot_prod_network:
      proxy-network:
        aliases:
          - lpsaring-backend
    restart: always

  # ------------------------
  #  Celery Worker
  # ------------------------
  celery_worker:
    image: babahdigital/sobigidul_backend:latest
    container_name: hotspot_prod_celery_worker
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    env_file:
      - .env.prod
    environment:
      MIKROTIK_CONNECT_TIMEOUT_SECONDS: "10"
      MIKROTIK_SOCKET_TIMEOUT_SECONDS: "10"
    volumes:
      - ./.env.prod:/app/.env:ro
    command: >
      /opt/venv/bin/celery -A app.extensions worker
      --loglevel=info
      --logfile=/dev/stdout
      --concurrency=6
      --max-memory-per-child=500000
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hotspot_prod_network
    restart: always

  # ------------------------
  #  Celery Beat (Scheduler)
  # ------------------------
  celery_beat:
    image: babahdigital/sobigidul_backend:latest
    container_name: hotspot_prod_celery_beat
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    env_file:
      - .env.prod
    volumes:
      - ./.env.prod:/app/.env:ro
    command: /opt/venv/bin/celery -A app.extensions beat --loglevel=info --logfile=/dev/stdout
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hotspot_prod_network
    restart: always

  # ------------------------
  #  Nuxt Frontend
  # ------------------------
  frontend:
    image: babahdigital/sobigidul_frontend:latest
    container_name: hotspot_prod_nuxt_frontend
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    env_file:
      - ./.env.public.prod
    # Pastikan Nuxt Nitro memakai port 3010
    environment:
      - PORT=${NUXT_PORT:-3010}
    healthcheck:
      # Gunakan /health (Nuxt server route ringan) agar tidak trigger SSR rendering
      # dan API call ke backend, yang menyebabkan log noise 401 setiap 15 detik.
      test:
        - CMD
        - /nodejs/bin/node
        - -e
        - fetch('http://127.0.0.1:3010/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      hotspot_prod_network:
      proxy-network:
        aliases:
          - lpsaring-frontend
    restart: always

# ------------------------
#  Volumes & Networks
# ------------------------
volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local

networks:
  hotspot_prod_network:
    driver: bridge
    name: hotspot_prod_net
  proxy-network:
    external: true
    name: proxy-network